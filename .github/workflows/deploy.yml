name: Deploy to Windows Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            $ErrorActionPreference = 'Stop'

            $overrideScriptPath = "${{ secrets.DEPLOY_SCRIPT_PATH }}".Trim()
            $candidateScripts = @()
            if ($overrideScriptPath) {
              $candidateScripts += $overrideScriptPath
            }
            $candidateScripts += @(
              "C:\CRA_Local_Main\app\deploy\deploy.ps1",
              "C:\CRA_Local_Main\deploy\deploy.ps1",
              "C:\apps\CRA_Local\deploy\deploy.ps1",
              "C:\apps\CRA_Local_W2016_Main\app\deploy\deploy.ps1",
              "C:\apps\CRA_Local_W2016\deploy\deploy.ps1",
              "C:\CRA_Local_W2016_Main\deploy\deploy.ps1",
              "C:\CRA_Local_W2016_Main\app\deploy\deploy.ps1"
            )

            $scriptPath = $null
            $resolvedCandidates = $candidateScripts | Select-Object -Unique
            Write-Host "Checking deploy scripts:"
            foreach ($candidate in $resolvedCandidates) {
              Write-Host " - $candidate"
              if (Test-Path $candidate) {
                $scriptPath = $candidate
                break
              }
            }

            if (-not $scriptPath) {
              Write-Error "Deploy script not found. Checked: $($candidateScripts -join ', ')"
              if (Test-Path "C:\apps") {
                Write-Host "C:\apps content (debug):"
                Get-ChildItem -Path "C:\apps" -Force | Select-Object Name,FullName,LastWriteTime
              }
              exit 1
            }

            $deployDir = Split-Path $scriptPath -Parent
            $appPath = Split-Path $deployDir -Parent

            $serviceCandidates = @("CRA_Local", "CRA_Local_W2016", "CRA_Local_App")
            $runningServices = @()
            $enabledServices = @()
            $serviceName = $null
            foreach ($candidate in $serviceCandidates) {
              $svc = Get-Service -Name $candidate -ErrorAction SilentlyContinue
              if (-not $svc) { continue }

              if ($svc.Status -eq "Running" -and -not $serviceName) {
                $runningServices += $candidate
                $serviceName = $candidate
                continue
              }

              $cim = Get-CimInstance Win32_Service -Filter ("Name='{0}'" -f $candidate) -ErrorAction SilentlyContinue
              if ($cim -and $cim.StartMode -ne "Disabled") {
                $enabledServices += $candidate
              }
            }
            if (-not $serviceName) {
              if ($enabledServices.Count -gt 0) {
                $serviceName = $enabledServices[0]
              } else {
                $serviceName = "CRA_Local_W2016"
              }
            }

            Write-Host "Deploy script: $scriptPath"
            Write-Host "App path: $appPath"
            Write-Host "Service candidates: $($serviceCandidates -join ', ')"
            Write-Host "Running candidates: $($runningServices -join ', ')"
            Write-Host "Enabled candidates: $($enabledServices -join ', ')"
            Write-Host "Service name: $serviceName"

            powershell -NoProfile -ExecutionPolicy Bypass -File $scriptPath -AppPath $appPath -ServiceName $serviceName
